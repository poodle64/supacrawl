name: default
description: >-
  Curated scrape-quality corpus spanning static HTML through JavaScript-heavy single-page apps, structured-data commerce, data tables, PDFs, anti-bot, and non-Latin/RTL pages. URLs favour frozen targets (purpose-built sandboxes, Wikipedia permalink revisions, immutable arXiv PDFs) so that score changes over time reflect supacrawl changes rather than the web shifting underneath. Volatile targets are marked stable=false and excluded from the regression index; they exist to probe the capability ceiling.


cases:
  # --- Static / baseline -------------------------------------------------
  - id: static-example
    url: https://example.com/
    category: static
    title: IANA example domain
    why: Irreducible baseline; if this is not clean, nothing will be.
    difficulty: 1
    probes: [baseline]
    expect: ['Example Domain', 'illustrative examples']

  - id: static-sandbox-simple
    url: https://www.scrapethissite.com/pages/simple/
    category: static
    title: ScrapeThisSite simple country list
    why: Static server-rendered list; tests faithful capture of repeated items.
    difficulty: 1
    probes: [static_list]
    expect: ['Andorra', 'Afghanistan']
    expect_absent: ['Sandbox', 'Lessons', 'FAQ']

  # --- Content article / news chrome ------------------------------------
  - id: article-wikipedia-en
    url: https://en.wikipedia.org/w/index.php?title=Web_scraping&oldid=1358788600
    category: article
    title: Wikipedia "Web scraping" (frozen revision)
    why: Heavy nav/sidebar chrome around real prose; the classic main-content test.
    difficulty: 2
    probes: [main_content, boilerplate_removal]
    expect: ['Web scraping', 'data scraping', 'HTTP']
    expect_absent: ['Jump to content', 'Create account', 'Privacy policy', 'What links here']

  - id: article-gutenberg-text
    url: https://www.gutenberg.org/cache/epub/84/pg84.txt
    category: article
    title: Project Gutenberg Frankenstein (plain text)
    why: Long plain-text body; tests that prose survives without mangling.
    difficulty: 1
    probes: [long_text]
    expect: ['Frankenstein', 'Walton']

  # --- Documentation -----------------------------------------------------
  - id: docs-python-json
    url: https://docs.python.org/3.12/library/json.html
    category: docs
    title: Python docs — json module
    why: Code blocks, definition lists and tables; tests structure preservation.
    difficulty: 2
    probes: [code_blocks, tables]
    expect: ['json.dumps', 'Serialize', 'object_hook']
    expect_absent: ['Navigation', 'Quick search', 'previous |']

  # --- E-commerce static + structured data ------------------------------
  - id: ecommerce-books-static
    url: https://books.toscrape.com/
    category: ecommerce
    title: Books to Scrape catalogue
    why: Purpose-built static shop; pagination and product grid, no schema markup.
    difficulty: 1
    probes: [product_grid]
    expect: ['A Light in the Attic', '£']

  - id: ecommerce-scrapeme-jsonld
    url: https://scrapeme.live/shop/Bulbasaur/
    category: ecommerce
    title: ScrapeMe WooCommerce product (JSON-LD)
    why: Real WooCommerce Product/Offer JSON-LD; tests structured-data harvest.
    difficulty: 2
    probes: [structured_data, json_ld]
    expect: ['Bulbasaur']

  - id: ecommerce-webscrapingdev-product
    url: https://web-scraping.dev/product/1
    category: ecommerce
    title: web-scraping.dev product 1 (JSON-LD + hidden JSON)
    why: ScrapFly sandbox product with embedded JSON-LD and hidden state.
    difficulty: 2
    probes: [structured_data, json_ld]
    expect: ['Box of Chocolate Candy']

  # --- JavaScript-rendered / SPA ----------------------------------------
  - id: spa-quotes-js
    url: https://quotes.toscrape.com/js/
    category: spa
    title: Quotes to Scrape (JavaScript build)
    why: Quotes exist only in a JS array; bare HTTP sees nothing — proves rendering.
    difficulty: 3
    js_heavy: true
    spa: true
    probes: [js_render]
    expect: ['Albert Einstein', 'world as we have created it']

  - id: spa-ajax-javascript
    url: https://www.scrapethissite.com/pages/ajax-javascript/
    category: spa
    title: ScrapeThisSite AJAX/JavaScript Oscars table
    why: Table populated by AJAX after load; tests wait-for-content behaviour.
    difficulty: 3
    js_heavy: true
    probes: [js_render, ajax]
    expect: ['2015', 'Spotlight']

  # --- Infinite scroll / lazy load --------------------------------------
  - id: infinite-quotes-scroll
    url: https://quotes.toscrape.com/scroll
    category: infinite_scroll
    title: Quotes to Scrape (infinite scroll)
    why: Content loads on scroll; measures how much a single render captures.
    difficulty: 3
    js_heavy: true
    probes: [infinite_scroll]
    expect: ['Albert Einstein']

  # --- Data tables -------------------------------------------------------
  - id: tables-wikipedia-gdp
    url: https://en.wikipedia.org/w/index.php?title=List_of_countries_by_GDP_(nominal)&oldid=1358330458
    category: tables
    title: Wikipedia GDP (nominal) tables (frozen revision)
    why: Several large data tables; tests markdown table fidelity.
    difficulty: 3
    probes: [tables]
    expect: ['United States', 'Gross domestic product']

  # --- PDF ---------------------------------------------------------------
  - id: pdf-arxiv-attention
    url: https://arxiv.org/pdf/1706.03762
    category: pdf
    title: 'arXiv: Attention Is All You Need (PDF)'
    why: >-
      Immutable academic PDF; tests PDF text extraction quality. LaTeX PDFs are the canonical trigger for the inter-word spacing defect, so this case also guards word_spacing (fused-word runs would tank the score).


    difficulty: 3
    content_type: pdf
    probes: [pdf, word_spacing]
    expect: ['Attention Is All You Need', 'Transformer', 'multi-head']

  # --- Internationalisation / RTL ---------------------------------------
  - id: i18n-ja-wikipedia
    url: https://ja.wikipedia.org/wiki/ウェブスクレイピング
    category: i18n
    title: Japanese Wikipedia — web scraping
    why: CJK content; tests encoding and that completeness survives non-Latin text.
    difficulty: 2
    probes: [i18n_cjk]
    expect: ['ウェブスクレイピング']

  - id: i18n-ar-wikipedia
    url: https://ar.wikipedia.org/wiki/تنقيب_الويب
    category: i18n
    title: Arabic Wikipedia — web scraping (RTL)
    why: Right-to-left script; tests RTL handling and ordering.
    difficulty: 2
    probes: [i18n_rtl]
    expect: ['تنقيب']

  # --- Anti-bot ----------------------------------------------------------
  - id: antibot-webscrapingdev-easy
    url: https://web-scraping.dev/antibot/easy
    category: antibot
    title: web-scraping.dev easy anti-bot
    why: Stable, deterministic anti-bot gate; tests default evasion on easy mode.
    difficulty: 4
    antibot: true
    probes: [antibot]

  - id: antibot-live-reviews
    url: https://www.example-reviews.com/categories/web-scraping
    category: antibot
    title: Reviews category (live Cloudflare)
    why: Live commercial anti-bot; capability ceiling probe, not regression signal.
    difficulty: 5
    antibot: true
    stable: false
    probes: [antibot, cloudflare]

  # --- Government / tax law / RAG ----------------------------------------
  # The operator's headline use case: harvesting Australian tax law into a RAG
  # collection. These probe gov-CMS HTML (tables + prose) and a frozen gov PDF.
  # They are scored=false (capability probes, not regression index): the
  # independent reference renderer is vanilla headless Chromium and the ATO CMS
  # serves it only a ~15-word shell (supacrawl's own stealth/JS escalation gets
  # the full content), so reference-based coverage/F1 are not trustworthy here.
  # The reliable signal lives in the per-case detail: expect_hit (anchors),
  # PIPES/tables (structure), and word_spacing — a regression collapses those.
  - id: gov-ato-tax-rates
    url: https://www.ato.gov.au/tax-rates-and-codes/tax-rates-australian-residents
    category: gov
    title: ATO resident tax rates (gov CMS, bracket tables)
    why: >-
      Australian Taxation Office guidance on a JS-rendered government CMS; the income-tax bracket tables must survive as markdown tables for RAG. The anchors are legislated values (the $18,200 tax-free threshold) rather than the year's marginal rate, so they stay valid across annual updates.


    difficulty: 3
    js_heavy: true
    scored: false
    probes: [gov, tables, main_content, rag]
    expect: ['Resident tax rates', 'taxable income', '18,200']
    expect_absent: ['Skip to', 'Back to top']

  - id: gov-ato-wfh
    url: https://www.ato.gov.au/individuals-and-families/income-deductions-offsets-and-records/deductions-you-can-claim/working-from-home-expenses
    category: gov
    title: ATO working-from-home deductions (gov CMS, prose)
    why: >-
      Long-form government guidance prose; tests main-content extraction on the same gov CMS without tables. A collapse toward the Next.js shell (near-zero words) catches a JS-shell-escalation regression.


    difficulty: 3
    js_heavy: true
    scored: false
    probes: [gov, main_content, rag]
    expect: ['Working from home expenses', 'running expenses', 'deduction']
    expect_absent: ['Skip to', 'Back to top']

  - id: gov-ato-pdf-depreciation
    url: https://www.ato.gov.au/api/public/content/a20e2f4ec8c041358a1885531785c8a0?v=62e5fe6a
    category: gov
    title: ATO Guide to depreciating assets 2025 (gov PDF)
    why: >-
      A versioned-immutable government PDF (NAT 1996-06.2025) reached through an extensionless content-API URL — exercises both content-type/magic-byte PDF detection and the word_spacing guard on a digitally-generated gov PDF, the exact shape of the operator's tax-law RAG sources.


    difficulty: 3
    content_type: pdf
    scored: false
    probes: [pdf, word_spacing, gov, rag, tables]
    expect: ['Guide to depreciating assets', 'decline in value', 'NAT 1996', 'assessable income']

  # --- Real-world operator use cases (retail, big-site JS) ---------------
  - id: ecommerce-retailer-au
    url: https://www.example-shop.com.au/discover/best-dog-food-for-sensitive-stomachs
    category: ecommerce
    title: Pet-supply retailer product guide (AU retailer, JSON-LD Article)
    why: >-
      The operator's pet-food research use case on a live Australian retailer; evergreen editorial with embedded JSON-LD Article. Tests main-content extraction plus deterministic structured-data harvest on a real commercial site (not a sandbox).


    difficulty: 2
    probes: [structured_data, json_ld, main_content]
    expect: ['dog', 'food', 'sensitive', 'Dr Michelle Wong']

  - id: docs-github-readme
    url: https://github.com/microsoft/playwright
    category: docs
    title: GitHub repo README (JS-rendered, microdata)
    why: >-
      A large JS-rendered application shell whose README only appears after the static HTML hydrates; tests the JS-shell escalation on a mainstream site and microdata (SoftwareSourceCode) harvest.


    difficulty: 2
    js_heavy: true
    probes: [js_render, structured_data, microdata]
    expect: ['Playwright', 'web automation']
    expect_absent: ['Skip to content']
