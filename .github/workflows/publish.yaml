name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: [self-hosted, atlas]
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (and Python 3.14)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.14'

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Notify failure (ntfy infra)
        if: failure() && github.event_name != 'pull_request'
        uses: poodle64/master-project/.github/actions/ntfy-failure@main
        with:
          title: 'supacrawl: publish failed'
