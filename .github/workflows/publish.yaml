name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: [self-hosted, atlas]
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (and Python 3.14)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.14'

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      # ntfy-failure inlined: supacrawl is a public repo; GitHub blocks public
      # repos from referencing actions in private repos (poodle64/master-project).
      # Logic mirrors poodle64/master-project/.github/actions/ntfy-failure@main.
      - name: Notify failure (ntfy infra)
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        env:
          NTFY_TITLE: 'supacrawl: publish failed'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TOKEN=""
          for f in /etc/ntfy/tokens/ci-publisher.token /run/secrets/ntfy/systemd; do
            [ -n "$TOKEN" ] && break
            [ -r "$f" ] && TOKEN="$(cat "$f")"
          done
          if [ -z "$TOKEN" ]; then
            echo "::warning::ntfy-failure: no token available — failure notification NOT sent"
            exit 0
          fi
          curl -sS --max-time 10 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Title: $NTFY_TITLE" \
            -H "Priority: 4" \
            -H "Tags: rotating_light" \
            -d "Run: $RUN_URL" \
            "https://ntfy.godswood.au/infra" \
            || echo "::warning::ntfy-failure: notification POST failed"
