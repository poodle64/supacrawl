name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: [self-hosted, atlas]
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (and Python 3.14)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
