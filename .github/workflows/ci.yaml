name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: [self-hosted, atlas]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (and Python 3.14)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      # ntfy-failure inlined: supacrawl is a public repo; GitHub blocks public
      # repos from referencing actions in private repos (poodle64/master-project).
      # Logic mirrors poodle64/master-project/.github/actions/ntfy-failure@main.
      - name: Notify failure (ntfy infra)
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        env:
          NTFY_TITLE: 'supacrawl: lint failed'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TOKEN=""
          for f in /etc/ntfy/tokens/ci-publisher.token /run/secrets/ntfy/systemd; do
            [ -n "$TOKEN" ] && break
            [ -r "$f" ] && TOKEN="$(cat "$f")"
          done
          if [ -z "$TOKEN" ]; then
            echo "::warning::ntfy-failure: no token available — failure notification NOT sent"
            exit 0
          fi
          curl -sS --max-time 10 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Title: $NTFY_TITLE" \
            -H "Priority: 4" \
            -H "Tags: rotating_light" \
            -d "Run: $RUN_URL" \
            "https://ntfy.godswood.au/infra" \
            || echo "::warning::ntfy-failure: notification POST failed"

  typecheck:
    runs-on: [self-hosted, atlas]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (and Python 3.14)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Type check
        run: uv run mypy src/ tests/

      - name: Notify failure (ntfy infra)
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        env:
          NTFY_TITLE: 'supacrawl: typecheck failed'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TOKEN=""
          for f in /etc/ntfy/tokens/ci-publisher.token /run/secrets/ntfy/systemd; do
            [ -n "$TOKEN" ] && break
            [ -r "$f" ] && TOKEN="$(cat "$f")"
          done
          if [ -z "$TOKEN" ]; then
            echo "::warning::ntfy-failure: no token available — failure notification NOT sent"
            exit 0
          fi
          curl -sS --max-time 10 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Title: $NTFY_TITLE" \
            -H "Priority: 4" \
            -H "Tags: rotating_light" \
            -d "Run: $RUN_URL" \
            "https://ntfy.godswood.au/infra" \
            || echo "::warning::ntfy-failure: notification POST failed"

  test:
    name: test
    # by-exception (2026-07-05): tests/test_browser.py drives a real headless
    # Chromium outside the e2e marker, and `playwright install --with-deps`
    # needs apt+sudo the NixOS atlas runner doesn't have (supacrawl#147). A
    # containerised self-hosted job was tried first but the atlas runner's
    # bundled github-runner package has no node24 externals, which container
    # jobs need for actions/checkout@v7 — a runner-packaging gap, not fixable
    # from this repo. Mirrors portcullis's gui-tests.yaml playwright-e2e job:
    # GitHub-hosted ubuntu-latest gives Playwright its native apt/sudo target.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (and Python 3.14)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.14'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Test
        run: uv run pytest -m "not e2e"

      # ntfy-failure inlined (public repo, see lint/typecheck jobs above); this
      # job runs on ubuntu-latest so the atlas host token files below don't
      # exist — falls through to secrets.NTFY_TOKEN, which is unset for this
      # repo today (warns and no-ops rather than failing the job).
      - name: Notify failure (ntfy infra)
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        env:
          NTFY_TITLE: 'supacrawl: test failed'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          TOKEN="$NTFY_TOKEN"
          for f in /etc/ntfy/tokens/ci-publisher.token /run/secrets/ntfy/systemd; do
            [ -n "$TOKEN" ] && break
            [ -r "$f" ] && TOKEN="$(cat "$f")"
          done
          if [ -z "$TOKEN" ]; then
            echo "::warning::ntfy-failure: no token available — failure notification NOT sent"
            exit 0
          fi
          curl -sS --max-time 10 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Title: $NTFY_TITLE" \
            -H "Priority: 4" \
            -H "Tags: rotating_light" \
            -d "Run: $RUN_URL" \
            "https://ntfy.godswood.au/infra" \
            || echo "::warning::ntfy-failure: notification POST failed"
