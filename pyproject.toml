 [build-system]
 requires = ["hatchling"]
 build-backend = "hatchling.build"

[project]
name = "web-scraper"
 version = "2025.12.0"
 description = "Generic website ingestion pipeline for crawling and corpus preparation."
 readme = "README.md"
 requires-python = ">=3.12"
 license = { text = "MIT" }
dependencies = [
  "aiofiles>=24.1.0",
  "beautifulsoup4>=4.12.3",
  "click>=8.1.7",
  "crawl4ai>=0.7.8",
  "httpx>=0.28.1",
  "ollama>=0.1.0",
  "pydantic>=2.9.0",
  "pyyaml>=6.0.1",
]

 [project.optional-dependencies]
 dev = [
   "mypy>=1.11.0",
   "pre-commit>=3.7.0",
   "pytest>=8.3.0",
   "ruff>=0.6.2",
   "types-aiofiles>=24.1.0",
   "types-PyYAML>=6.0.1",
 ]

[project.scripts]
web-scraper = "web_scraper.cli:app"
