 [build-system]
 requires = ["hatchling"]
 build-backend = "hatchling.build"

[project]
name = "supacrawl"
 version = "2025.12.3"
 description = "Generic website ingestion pipeline for crawling and corpus preparation."
 readme = "README.md"
 requires-python = ">=3.12"
 license = { text = "MIT" }
dependencies = [
  "aiofiles>=24.1.0",
  "beautifulsoup4>=4.12.3",
  "click>=8.1.7",
  "httpx>=0.28.1",
  "markdownify>=0.14.0",
  "ollama>=0.1.0",
  "playwright>=1.49.0",
  "pydantic>=2.9.0",
  "pyyaml>=6.0.1",
]

 [project.optional-dependencies]
 dev = [
   "mypy>=1.11.0",
   "pre-commit>=3.7.0",
   "pytest>=8.3.0",
   "pytest-asyncio>=0.23.0",
   "pytest-xdist>=3.5.0",
   "ruff>=0.6.2",
   "types-aiofiles>=24.1.0",
   "types-PyYAML>=6.0.1",
 ]
stealth = [
  "patchright>=1.56.0",
]
captcha = [
  "2captcha-python>=1.2.0",
]

[project.scripts]
supacrawl = "supacrawl.cli:app"

[tool.pytest.ini_options]
markers = [
    "unit: Pure logic tests with no I/O, network, or browser",
    "integration: Filesystem-heavy tests, may use local HTTP server and Playwright",
    "e2e: End-to-end tests with live network and Playwright",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:The 'text' argument to find\\(\\)-type methods is deprecated:DeprecationWarning:bs4.element",
]

[tool.hatchling.build.targets.wheel]
packages = ["src/supacrawl"]
