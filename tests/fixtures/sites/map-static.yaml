id: map-static
name: Map Static (Local HTML)

# Note: Entrypoint is replaced in test with local HTTP server URL
entrypoints:
  - http://127.0.0.1:8000/index.html

include:
  - http://127.0.0.1:8000/**

exclude:
  - http://127.0.0.1:8000/tools/**

max_pages: 10

formats:
  - markdown

only_main_content: true
include_subdomains: false

sitemap:
  enabled: false

robots:
  respect: true
  enforcement: strict
  user_agent: WebScraperBot/1.0
