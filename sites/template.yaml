# Site Configuration Template
# 
# This template shows all available configuration options for web-scraper.
# Copy this file and customize it for your site. Remove sections you don't need.
#
# Required fields are marked with # REQUIRED
# Optional fields have default values shown in comments

# OPTIONAL: Unique site identifier (auto-derived from filename if omitted)
# If you include this field, it must match the filename without .yaml
# Example: example-site.yaml -> id: example-site
# id: example-site

# REQUIRED: Human-readable site name
name: Example Site

# REQUIRED: Starting URLs for the crawl (at least one required)
entrypoints:
  - https://example.com
  - https://example.com/docs

# REQUIRED: URL patterns to include in crawl
include:
  - https://example.com/**
  - https://example.com/docs/**

# REQUIRED: URL patterns to exclude from crawl
exclude:
  - https://example.com/admin/**
  - https://example.com/private/**

# REQUIRED: Maximum pages to crawl (positive integer)
max_pages: 100

# REQUIRED: Content formats to extract
formats:
  - html
  - markdown
  - json

# REQUIRED: Extract main content only (removes navigation, headers, footers)
only_main_content: true

# REQUIRED: Include subdomains in crawl
include_subdomains: false

# OPTIONAL: Sitemap configuration
# Default: enabled: false
sitemap:
  enabled: true
  # Explicit sitemap URLs (overrides auto-discovery)
  urls: []
  # Only crawl URLs from sitemaps (no link following)
  only: false
  # Only include URLs modified after this date (ISO format: YYYY-MM-DD)
  filter_by_lastmod: null

# OPTIONAL: Robots.txt configuration
# Default: respect: true, enforcement: "warn", user_agent: "WebScraperBot/1.0"
robots:
  # Whether to respect robots.txt at all
  respect: true
  # Enforcement level: "strict" (block), "warn" (log only), "ignore"
  enforcement: warn
  # User agent for robots.txt matching
  user_agent: WebScraperBot/1.0
  # Minimum delay between requests (seconds), applied on top of Crawl-delay
  min_delay: 0.0

# OPTIONAL: Politeness and pacing configuration
# These settings control how aggressively the crawler requests pages.
# Defaults are conservative to avoid overwhelming target servers.
politeness:
  # Maximum concurrent page crawls (1-20)
  # Default: 5
  max_concurrent: 5
  # Delay range between requests in seconds (min, max)
  # A random value in this range is chosen for each request
  # Default: [1.0, 2.0]
  delay_between_requests: [1.0, 2.0]
  # Maximum time to wait for a page to load (seconds, 5-600)
  # Default: 120
  page_timeout: 120
  # Maximum retry attempts for failed requests (0-10)
  # Default: 3
  max_retries: 3

# OPTIONAL: Markdown fixes configuration
# Markdown fixes are workarounds for edge cases in HTML-to-markdown conversion.
# These were originally created for Crawl4AI bugs and may no longer be needed
# with the current markdownify-based converter. Test with fixes disabled first.
# Default: enabled: false (must be explicitly enabled)
markdown_fixes:
  # Whether to enable all markdown fixes
  enabled: false
  # Per-fix configuration (fix name -> enabled)
  # Example: enable specific fixes while keeping others disabled
  fixes:
    missing-link-text-in-lists: false
    # Add more fixes here as they are added to web-scraper
    # Format: "fix-name": true|false
